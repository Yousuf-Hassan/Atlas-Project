<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas University — Sign Up</title>
  <link rel="icon" type="image/png" href="../assets/images/atlas-logo.png">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-theme-toggle">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </div>

  <div class="auth-wrapper">
    <div class="auth-logo">
      <img src="../assets/images/atlas-logo.png" alt="Atlas University">
      <span>Atlas University</span>
    </div>
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join Atlas University today</p>
      <form class="auth-form" action="thanks.html" method="get">
        <div class="auth-field">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>
        <div class="auth-field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn-auth">Create Account</button>
      </form>
      <p class="auth-toggle-link">
        Already have an account? <a href="login.html" class="auth-link">Log In</a>
      </p>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    toggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
