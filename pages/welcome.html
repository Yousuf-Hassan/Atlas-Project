<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas University — Welcome</title>
  <link rel="icon" type="image/png" href="../assets/images/atlas-logo.png">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="confirm-page">

  <div class="auth-theme-toggle">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </div>

  <div class="message-box">
    <div class="confirm-icon">🎓</div>
    <h1>Welcome Back!</h1>
    <p>You have successfully logged in to your Atlas University account.</p>
    <a href="../index.html" class="btn-home">Go to Home</a>
  </div>

  <script>
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    toggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
